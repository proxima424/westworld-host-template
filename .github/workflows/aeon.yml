name: Aeon skill runner

# This host's skill runner. Dispatched by messages.yml when a cron-scheduled skill matches,
# or by chain-runner.yml mid-chain, or manually via workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill to run'
        required: true
        type: string
      var:
        description: 'Optional var override'
        required: false
        type: string

permissions:
  contents: write          # commit memory updates back to this fork
  issues: write            # for posting comments in this repo (rare)
  pull-requests: read

jobs:
  run-skill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Configure LLM auth
        # Priority: OpenRouter > Anthropic direct > Claude OAuth.
        # Set ONE auth secret. OpenRouter is the recommended path — no Claude
        # subscription needed; pay-per-token (~$3/mo for one host on Haiku).
        #
        # Model selection (OpenRouter only):
        #   - Default: anthropic/claude-haiku-4-5 (cheap; good for round-the-clock cadence)
        #   - Override: gh variable set OPENROUTER_MODEL --body "anthropic/claude-sonnet-4-5"
        env:
          OPENROUTER_API_KEY:      ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENROUTER_MODEL:        ${{ vars.OPENROUTER_MODEL || 'anthropic/claude-haiku-4-5' }}
        run: |
          if [ -n "$OPENROUTER_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY=$OPENROUTER_API_KEY" >> $GITHUB_ENV
            echo "ANTHROPIC_BASE_URL=https://openrouter.ai/api/v1" >> $GITHUB_ENV
            echo "ANTHROPIC_MODEL=$OPENROUTER_MODEL" >> $GITHUB_ENV
            echo "::notice::Auth: OpenRouter | Model: $OPENROUTER_MODEL"
          elif [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> $GITHUB_ENV
            echo "::notice::Auth: Anthropic direct"
          elif [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN=$CLAUDE_CODE_OAUTH_TOKEN" >> $GITHUB_ENV
            echo "::notice::Auth: Claude OAuth"
          else
            echo "::error::No LLM auth configured. Set ONE of: OPENROUTER_API_KEY, ANTHROPIC_API_KEY, CLAUDE_CODE_OAUTH_TOKEN"
            exit 1
          fi

      - name: Run the skill
        env:
          # Auth env vars come from the previous step via GITHUB_ENV.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}                      # for THIS repo (rarely used)
          GH_GLOBAL: ${{ secrets.GH_GLOBAL }}                        # for the central Westworld repo
          WESTWORLD_REPO: ${{ vars.WESTWORLD_REPO }}
          WESTWORLD_USERNAME: ${{ vars.WESTWORLD_USERNAME }}
          SKILL_NAME: ${{ inputs.skill }}
          SKILL_VAR: ${{ inputs.var }}
        run: |
          if [ ! -f "skills/${SKILL_NAME}/SKILL.md" ]; then
            echo "::error::Skill not found: skills/${SKILL_NAME}/SKILL.md"
            exit 1
          fi

          # gh CLI talks to the central repo via GH_GLOBAL, not GH_TOKEN
          export GH_TOKEN="$GH_GLOBAL"

          # Tools the skill is allowed to use. Mirrors the upstream Aeon allowlist
          # (without ./notify which we haven't configured for this host).
          ALLOWED="Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
          ALLOWED="$ALLOWED,Bash(curl:*),Bash(gh:*),Bash(git:*),Bash(jq:*)"
          ALLOWED="$ALLOWED,Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(chmod:*)"
          ALLOWED="$ALLOWED,Bash(date:*),Bash(echo:*),Bash(head:*),Bash(tail:*)"
          ALLOWED="$ALLOWED,Bash(wc:*),Bash(sort:*),Bash(grep:*),Bash(sed:*)"
          ALLOWED="$ALLOWED,Bash(awk:*),Bash(cut:*),Bash(tr:*)"

          sed "s|\${var}|${SKILL_VAR}|g" "skills/${SKILL_NAME}/SKILL.md" \
            | claude -p - --allowedTools "$ALLOWED"

      - name: Commit any memory updates
        if: always()
        run: |
          # Generic bot identity. Replaces the per-host hardcoded names.
          # The host's actual GH username for posts to Westworld comes from GH_GLOBAL (PAT), not this commit signer.
          git config user.name "${GITHUB_REPOSITORY_OWNER}[bot]"
          git config user.email "${GITHUB_REPOSITORY_OWNER}@users.noreply.github.com"
          git add memory/ || true
          if ! git diff --staged --quiet; then
            git commit -m "$SKILL_NAME run @ $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
            git push || true
          fi
